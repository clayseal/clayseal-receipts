name: AgentAuth Devin Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AgentAuth
        run: python -m pip install -e .

      - name: Restore AgentAuth gate key
        env:
          AGENTAUTH_GATE_KEY_PEM: ${{ secrets.AGENTAUTH_GATE_KEY_PEM }}
        run: |
          mkdir -p .agentauth/keys agentauth-receipts
          printf '%s' "$AGENTAUTH_GATE_KEY_PEM" > .agentauth/keys/gate.ed25519.pem
          chmod 600 .agentauth/keys/gate.ed25519.pem

      - name: AgentAuth evaluate Devin PR
        run: |
          python demo/agentauth_gate.py evaluate \
            --repo . \
            --base origin/${{ github.base_ref }} \
            --head ${{ github.event.pull_request.head.sha }} \
            --authorization .agentauth/mandates/gh-1337.authorization.json \
            --policy demo/policies/devin-pr-gate.policy.json \
            --issue .github/issues/gh-1337.md \
            --receipt agentauth-receipts/pr-${{ github.event.pull_request.number }}.json \
            --key .agentauth/keys/gate.ed25519.pem \
            --github-actor '${{ github.event.pull_request.user.login }}'

      - name: Upload AgentAuth receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentauth-pr-gate-receipt
          path: agentauth-receipts/*.json
