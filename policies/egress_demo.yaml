version: 1
name: egress_demo
tier: structural
capability: operator_attested

allowed_tools:
  tools:
    - http_post
    - score_transaction

egress:
  enabled: true
  default_deny: true
  allowed_hosts:
    - "api.trusted.example"
    - "127.0.0.1"
  network_tools:
    - http_post

output_schema:
  fields:
    - status
  required:
    - status
