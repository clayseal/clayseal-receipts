name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: pberlizov/agentauth-identity
          path: deps/agentauth-identity
          ref: main
      - uses: actions/checkout@v4
        with:
          repository: pberlizov/agentauth-capabilities
          path: deps/agentauth-capabilities
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install three-layer stack
        run: |
          pip install "./deps/agentauth-identity[dev]"
          pip install "./deps/agentauth-capabilities[dev]"
          pip install -e ".[dev]"
      - name: Run Python tests
        run: |
          pytest python/tests -q --ignore=python/tests/test_interop_conformance.py
          pytest sdk/python/tests -q

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --all -q
