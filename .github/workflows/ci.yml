name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install receipts
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[server,mcp,verifier]" pytest pytest-asyncio ruff
      - name: Import + basic receipt flow
        run: |
          python - <<'PY'
          import agentauth.receipts as r
          assert r.__version__
          try:
              r.GoalSpec
          except ImportError as exc:
              assert "agentauth-receipts[scoping]" in str(exc)
          w = r.AgentWrapper(
              lambda i: {"decision": "approve", "fraud_score": 0.1},
              r.Policy.from_dict({
                  "version": 1,
                  "name": "ci",
                  "tier": "structural",
                  "capability": "operator_attested",
              }),
              mode="shadow",
              audit_db=":memory:",
          )
          result = w.run({"transaction_id": "t1", "amount": 1.0})
          bundle = r.build_receipt_bundle(result, certificate=w.certificate)
          report = r.verify_receipt_bundle(bundle)
          assert isinstance(report, dict)
          print("standalone receipts flow OK")
          PY
      - name: Run standalone Python tests
        run: |
          pytest python/tests -q --ignore=python/tests/test_interop_conformance.py
      - name: Check undefined names in release-owned modules
        run: |
          ruff check --select F821 agentauth/core agentauth/receipts

  identity-seam:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install receipts with identity extra
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[server,mcp,verifier,identity]" pytest pytest-asyncio
      - name: Run identity seam tests
        run: |
          pytest sdk/python/tests -q

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Smoke installed wheel
        run: |
          python -m venv /tmp/receipts-wheel
          /tmp/receipts-wheel/bin/python -m pip install --upgrade pip
          /tmp/receipts-wheel/bin/pip install "dist/agentauth_receipts-0.5.0-py3-none-any.whl[verifier]"
          /tmp/receipts-wheel/bin/python - <<'PY'
          import agentauth.core
          import agentauth.receipts as r
          assert r.__version__ == "0.5.0"
          print("wheel imports OK")
          PY

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --all -q
