name: security

# Supply-chain scanning, additive to ci.yml (Python/package/Rust jobs).
# Trivy fs also scans Cargo.lock, so the Rust crates are covered here too.
on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly: catch newly-disclosed CVEs in already-pinned deps

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install self editable, so --skip-editable audits only third-party deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[server,mcp,verifier]"
          pip install pip-audit
      - name: Audit third-party dependencies
        run: pip-audit --skip-editable --progress-spinner off

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install gitleaks CLI
        env:
          GITLEAKS_VERSION: "8.28.0"
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan for committed secrets
        run: gitleaks detect --source . --redact --verbose

  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Trivy filesystem scan (Python + Cargo.lock vulns, misconfig, secrets)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
