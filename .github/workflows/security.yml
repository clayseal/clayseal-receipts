name: security

# Supply-chain scanning, additive to ci.yml (python/core-only/rust jobs).
# Trivy fs also scans Cargo.lock, so the Rust crates are covered here too.
on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly: catch newly-disclosed CVEs in already-pinned deps

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: pberlizov/agentauth-core
          path: deps/agentauth-core
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install (siblings + self editable, so --skip-editable audits only third-party deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ./deps/agentauth-core
          pip install -e ".[server,mcp,verifier]"
          pip install pip-audit
      - name: Audit third-party dependencies
        run: pip-audit --skip-editable --progress-spinner off

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan (Python + Cargo.lock vulns, misconfig, secrets)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
