# Design partner stack: verifier + optional MCP fraud server
services:
  verifier:
    build: .
    ports:
      - "8787:8787"
    env_file:
      - path: .env
        required: false
    environment:
      AGENT_RECEIPTS_CLI: /usr/local/bin/agent-receipts
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/ready')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  mcp:
    build: .
    command:
      [
        "python3",
        "examples/mcp_live_server.py",
        "--transport",
        "sse",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    ports:
      - "8000:8000"
    profiles:
      - mcp

  pilot:
    build: .
    command: ["python3", "examples/partner_pilot.py"]
    volumes:
      - ./receipts:/app/receipts
    profiles:
      - pilot
